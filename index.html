<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Springfield Voice Modulator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Luckiest+Guy&family=Nunito:wght@400;700;900&display=swap');

        :root {
            --simp-yellow: #FFD90F;
            --simp-blue: #70D1FE;
            --simp-pink: #E472A1;
            --simp-green: #47B34A;
            --simp-brown: #C17F5B;
        }

        body {
            background-color: var(--simp-blue);
            background-image: 
                radial-gradient(circle at 20% 20%, rgba(255,255,255,0.4) 10%, transparent 20%),
                radial-gradient(circle at 80% 40%, rgba(255,255,255,0.4) 15%, transparent 25%),
                radial-gradient(circle at 40% 80%, rgba(255,255,255,0.4) 10%, transparent 20%);
            color: #000;
            font-family: 'Nunito', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
        }

        h1, h2, h3, .comic-text {
            font-family: 'Luckiest Guy', cursive;
            letter-spacing: 2px;
        }

        .panel {
            background: #fff;
            border: 6px solid #000;
            border-radius: 20px;
            box-shadow: 10px 10px 0 rgba(0, 0, 0, 0.2);
            position: relative;
        }

        textarea {
            background: #f4f4f4;
            border: 4px solid #000;
            border-radius: 12px;
            color: #000;
            font-family: 'Nunito', sans-serif;
            font-weight: 700;
            font-size: 1.1rem;
            resize: none;
            transition: all 0.2s ease;
            box-shadow: inset 4px 4px 0 rgba(0,0,0,0.05);
        }

        textarea:focus {
            outline: none;
            background: #fff;
            border-color: var(--simp-blue);
        }

        select {
            background: #fff;
            border: 4px solid #000;
            border-radius: 12px;
            color: #000;
            font-family: 'Luckiest Guy', cursive;
            font-size: 1.2rem;
            outline: none;
            cursor: pointer;
            box-shadow: 4px 4px 0 rgba(0,0,0,0.1);
        }

        input[type="password"] {
            background: #f4f4f4;
            border: 4px solid #000;
            border-radius: 12px;
            color: #000;
            font-weight: bold;
            outline: none;
            box-shadow: inset 4px 4px 0 rgba(0,0,0,0.05);
            transition: all 0.2s ease;
        }

        input[type="password"]:focus {
            background: #fff;
            border-color: var(--simp-blue);
        }

        .btn {
            background: #fff;
            border: 4px solid #000;
            border-radius: 12px;
            color: #000;
            font-family: 'Luckiest Guy', cursive;
            font-size: 1.2rem;
            letter-spacing: 1px;
            transition: all 0.1s;
            position: relative;
            box-shadow: 4px 4px 0 #000;
            cursor: pointer;
        }

        .btn:hover:not(:disabled) {
            transform: translate(-2px, -2px);
            box-shadow: 6px 6px 0 #000;
        }
        
        .btn:active:not(:disabled) {
            transform: translate(4px, 4px);
            box-shadow: 0px 0px 0 #000;
        }

        .btn:disabled {
            background: #ccc !important;
            color: #666;
            box-shadow: 4px 4px 0 #666;
            cursor: not-allowed;
            transform: none;
        }

        .btn-pink { background: var(--simp-pink); color: #fff; }
        .btn-yellow { background: var(--simp-yellow); }
        .btn-green { background: var(--simp-green); color: #fff; }

        /* The Cartoon Donut CSS */
        .donut-container {
            position: relative;
            width: 100px;
            height: 100px;
            margin: 0 auto 20px auto;
            animation: spin 6s linear infinite;
        }

        .donut {
            width: 100px;
            height: 100px;
            background-color: #D4A373; /* Dough */
            border-radius: 50%;
            border: 5px solid #000;
            position: relative;
            box-shadow: inset -5px -5px 0 rgba(0,0,0,0.2);
            overflow: hidden;
        }

        .frosting {
            position: absolute;
            top: -10px;
            left: -10px;
            right: -10px;
            bottom: 20px;
            background-color: var(--simp-pink);
            border-radius: 50%;
            border-bottom: 5px solid #000;
        }

        .donut::after {
            /* The Donut Hole */
            content: "";
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 30px;
            height: 30px;
            background-color: var(--simp-blue);
            border-radius: 50%;
            border: 5px solid #000;
            box-shadow: inset 3px 3px 0 rgba(0,0,0,0.2);
            z-index: 10;
        }

        .sprinkle {
            position: absolute;
            width: 4px;
            height: 12px;
            border-radius: 2px;
            border: 1px solid #000;
            z-index: 5;
        }

        @keyframes spin { 100% { transform: rotate(360deg); } }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }

        .title-bounce { animation: bounce 2s infinite ease-in-out; }

        .loader {
            border: 4px solid rgba(0, 0, 0, 0.1);
            border-top: 4px solid #000;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin-loader 1s linear infinite;
            display: none;
            margin: 0 auto;
        }

        @keyframes spin-loader { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="donut-container">
        <div class="donut">
            <div class="frosting"></div>
            <!-- Sprinkles -->
            <div class="sprinkle" style="top: 20px; left: 30px; background: #00f; transform: rotate(45deg);"></div>
            <div class="sprinkle" style="top: 30px; left: 70px; background: #0f0; transform: rotate(-30deg);"></div>
            <div class="sprinkle" style="top: 60px; left: 20px; background: #ff0; transform: rotate(70deg);"></div>
            <div class="sprinkle" style="top: 70px; left: 80px; background: #f00; transform: rotate(-10deg);"></div>
            <div class="sprinkle" style="top: 15px; left: 55px; background: #fff; transform: rotate(15deg);"></div>
        </div>
    </div>

    <div class="w-full max-w-3xl panel p-6 md:p-10 text-center">
        <h1 class="text-4xl md:text-5xl text-[var(--simp-yellow)] font-black mb-2 title-bounce" style="-webkit-text-stroke: 2px #000; text-shadow: 4px 4px 0 #000;">Springfield Voice Modulator</h1>
        <p class="mb-8 font-bold text-lg">Turn your text into cartoon gold!</p>

        <div class="mb-6 text-left p-4 bg-[var(--simp-yellow)] border-4 border-black rounded-xl box-shadow-cartoon">
            <label class="comic-text text-xl">API Key (The Secret Sauce):</label>
            <div class="flex flex-col md:flex-row gap-2 mt-2">
                <input type="password" id="apiKeyInput" class="w-full p-3 text-lg flex-1" placeholder="Paste Gemini API Key here...">
                <button id="saveKeyBtn" class="btn btn-green px-6 py-2">Save Key!</button>
            </div>
            <div id="keyStatus" class="mt-3 p-3 bg-white border-4 border-black text-black hidden rounded-xl flex items-center justify-center gap-2 font-bold">
                Excellent! Key saved locally.
            </div>
        </div>

        <div class="mb-6 flex flex-col md:flex-row gap-4 items-center justify-between text-left">
            <label class="comic-text text-2xl">Who's Talking?</label>
            <select id="characterSelect" class="p-3 w-full md:w-auto flex-1">
                <option value="homer">Homer S.</option>
                <option value="moleman">Hans Moleman</option>
                <option value="burns">Mr. Burns</option>
                <option value="comicguy">Comic Book Guy</option>
                <option value="krusty">Krusty</option>
                <option value="otto">Otto Mann</option>
                <option value="milhouse">Milhouse</option>
            </select>
        </div>

        <div class="mb-6 text-left">
            <label class="block comic-text text-xl mb-2">Write something funny:</label>
            <textarea id="textInput" class="w-full h-32 p-4 text-xl" placeholder="Mmm... forbidden donut..."></textarea>
        </div>

        <div class="flex flex-col md:flex-row gap-4 justify-center items-center">
            <button id="dictateBtn" class="btn w-full md:w-auto px-6 py-3 flex items-center justify-center gap-2">
                🎤 Dictate
            </button>

            <button id="speakBtn" class="btn btn-pink w-full md:w-auto px-8 py-3 text-2xl flex items-center justify-center gap-2">
                ▶ Speak, Man!
            </button>
        </div>

        <div id="loadingIndicator" class="mt-6 font-bold hidden flex-col items-center comic-text text-xl">
            <div class="loader mb-2" style="display: block;"></div>
            Warming up the tubes...
        </div>

        <div id="downloadSection" class="mt-6 hidden flex-col items-center border-t-4 border-black pt-6">
            <p class="comic-text text-xl mb-3">Audio Saved!</p>
            <a id="downloadLink" class="btn btn-yellow px-6 py-2 flex items-center justify-center gap-2 w-full md:w-auto" download="springfield_audio.wav">
                💾 Download .WAV
            </a>
        </div>

        <div id="errorMsg" class="mt-4 p-4 bg-red-400 border-4 border-black font-bold hidden rounded-xl"></div>
    </div>

    <script>
        // --- Simpsons Character Profiles ---
        // We use EQ to completely change how the AI voices sound natively.
        const characterProfiles = {
            homer: {
                voice: "Orus",
                prompt: "Speak extremely fast in a dopey, lazy, hungry, comedic, and slightly whiny middle-aged man voice: ",
                playbackRate: 0.92, // Dropped pitch for dad-bod depth, but the "fast" prompt keeps the pace normal
                eqLow: { freq: 250, gain: 8 }, // Heavy chest resonance
                eqHigh: { freq: 4000, gain: -2 }, 
                delays: []
            },
            moleman: {
                voice: "Puck",
                prompt: "Speak extremely fast in a shaky, weak, frail, pathetic, and raspy elderly croak: ",
                playbackRate: 0.94, // Pitched down for age
                eqLow: { freq: 300, gain: -15 }, // Strip away ALL bass to make it thin and reedy
                eqHigh: { freq: 2500, gain: 8 }, // Extreme nasal boost
                delays: []
            },
            burns: {
                voice: "Fenrir",
                prompt: "Speak extremely fast in an aristocratic, sinister, raspy, ancient, and evil billionaire voice: ",
                playbackRate: 0.94, 
                eqLow: { freq: 200, gain: -12 }, // Thin out the old man voice
                eqHigh: { freq: 5000, gain: 14 }, // Maximum boost to high frequencies for rasp/hiss
                delays: []
            },
            comicguy: {
                voice: "Charon",
                prompt: "Speak extremely fast in a sarcastic, arrogant, stuffy, nasal, and condescending overweight nerd voice: ",
                playbackRate: 0.90, // Deep, weighty pitch
                eqLow: { freq: 200, gain: 4 }, 
                eqHigh: { freq: 1200, gain: 15 }, // Massive boost to the 1.2kHz mid-range for maximum nasal "honk"
                delays: []
            },
            krusty: {
                voice: "Orus",
                prompt: "Speak normally in a manic, loud, harsh, raspy, burnt-out, and gravelly clown voice: ",
                playbackRate: 1.10, // Fast, manic, pitched slightly up
                eqLow: { freq: 250, gain: 4 },
                eqHigh: { freq: 3500, gain: 10 }, // Very harsh and gravelly high-end
                delays: []
            },
            otto: {
                voice: "Zephyr",
                prompt: "Speak extremely fast in a raspy, relaxed, spaced-out, surfer dude rocker voice: ",
                playbackRate: 0.92, // Pitched down for that relaxed, older rocker tone
                eqLow: { freq: 200, gain: 5 }, // Slight bass boost for chestiness
                eqHigh: { freq: 3000, gain: 4 }, // Emphasize the rasp
                delays: []
            },
            milhouse: {
                voice: "Kore",
                prompt: "Speak extremely slowly and clearly in a whiny, high-pitched, nasal, nerdy young boy voice: ",
                playbackRate: 1.35, // Drastically pitched UP for the kid voice, counter-acted by the "slow" prompt!
                eqLow: { freq: 200, gain: -8 }, // Remove adult bass
                eqHigh: { freq: 2000, gain: 12 }, // High nasal whine
                delays: []
            }
        };

        // --- UI Elements ---
        const apiKeyInput = document.getElementById('apiKeyInput');
        const textInput = document.getElementById('textInput');
        const dictateBtn = document.getElementById('dictateBtn');
        const speakBtn = document.getElementById('speakBtn');
        const characterSelect = document.getElementById('characterSelect');
        const loadingIndicator = document.getElementById('loadingIndicator');
        const errorMsg = document.getElementById('errorMsg');
        const downloadSection = document.getElementById('downloadSection');
        const downloadLink = document.getElementById('downloadLink');
        const saveKeyBtn = document.getElementById('saveKeyBtn');
        const keyStatus = document.getElementById('keyStatus');

        // --- Web Audio API Context ---
        let audioContext;
        let currentDownloadUrl = null;

        // Load saved API key (keeping the old variable name so you don't have to re-enter it!)
        const savedKey = localStorage.getItem('khala_api_key');
        if (savedKey) {
            apiKeyInput.value = savedKey;
            saveKeyBtn.innerText = "Key Updated!";
        }

        // Save key button logic
        saveKeyBtn.addEventListener('click', () => {
            const key = apiKeyInput.value.trim();
            if (key) {
                localStorage.setItem('khala_api_key', key);
                keyStatus.style.display = 'flex';
                saveKeyBtn.innerText = "Saved!";
                setTimeout(() => {
                    keyStatus.style.display = 'none';
                    saveKeyBtn.innerText = "Update Key";
                }, 3000);
            }
        });

        apiKeyInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') { e.preventDefault(); saveKeyBtn.click(); }
        });

        function initAudioContext() {
            if (!audioContext) {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioContext.state === 'suspended') {
                audioContext.resume();
            }
        }

        // --- Utilities ---
        function base64ToFloat32Array(base64) {
            const binaryString = window.atob(base64);
            const bytes = new Uint8Array(binaryString.length);
            for (let i = 0; i < binaryString.length; i++) {
                bytes[i] = binaryString.charCodeAt(i);
            }
            const dataView = new DataView(bytes.buffer);
            const floatArray = new Float32Array(bytes.length / 2);
            for (let i = 0; i < floatArray.length; i++) {
                floatArray[i] = dataView.getInt16(i * 2, true) / 32768.0;
            }
            return floatArray;
        }

        async function fetchWithBackoff(url, options, maxRetries = 5) {
            const delays = [1000, 2000, 4000, 8000, 16000];
            for (let i = 0; i < maxRetries; i++) {
                try {
                    const response = await fetch(url, options);
                    if (!response.ok) {
                        const errText = await response.text();
                        throw new Error(`API Error ${response.status}: ${errText}`);
                    }
                    return await response.json();
                } catch (error) {
                    if (i === maxRetries - 1) throw error;
                    await new Promise(resolve => setTimeout(resolve, delays[i]));
                }
            }
        }

        function audioBufferToWav(buffer) {
            const numChannels = buffer.numberOfChannels;
            const sampleRate = buffer.sampleRate;
            const format = 1; // PCM
            const bitDepth = 16;
            
            const result = new Float32Array(buffer.length * numChannels);
            for (let channel = 0; channel < numChannels; channel++) {
                const channelData = buffer.getChannelData(channel);
                for (let i = 0; i < buffer.length; i++) {
                    result[i * numChannels + channel] = channelData[i];
                }
            }

            const dataLength = result.length * (bitDepth / 8);
            const bufferLength = 44 + dataLength;
            const dataView = new DataView(new ArrayBuffer(bufferLength));

            const writeString = (view, offset, string) => {
                for (let i = 0; i < string.length; i++) view.setUint8(offset + i, string.charCodeAt(i));
            };

            writeString(dataView, 0, 'RIFF');
            dataView.setUint32(4, 36 + dataLength, true);
            writeString(dataView, 8, 'WAVE');
            writeString(dataView, 12, 'fmt ');
            dataView.setUint32(16, 16, true);
            dataView.setUint16(20, format, true);
            dataView.setUint16(22, numChannels, true);
            dataView.setUint32(24, sampleRate, true);
            dataView.setUint32(28, sampleRate * numChannels * (bitDepth / 8), true);
            dataView.setUint16(32, numChannels * (bitDepth / 8), true);
            dataView.setUint16(34, bitDepth, true);
            writeString(dataView, 36, 'data');
            dataView.setUint32(40, dataLength, true);

            let offset = 44;
            for (let i = 0; i < result.length; i++, offset += 2) {
                let s = Math.max(-1, Math.min(1, result[i]));
                dataView.setInt16(offset, s < 0 ? s * 0x8000 : s * 0x7FFF, true);
            }

            return new Blob([dataView], { type: 'audio/wav' });
        }

        // --- Offline Audio Processing & Rendering ---
        async function renderCartoonAudio(floatArray, sampleRate, profile) {
            const baseDuration = floatArray.length / sampleRate;
            const rateAdjustedDuration = baseDuration / profile.playbackRate;
            const totalDuration = rateAdjustedDuration + 0.5; // add tiny tail just in case
            
            const offlineCtx = new (window.OfflineAudioContext || window.webkitOfflineAudioContext)(1, Math.ceil(totalDuration * sampleRate), sampleRate);
            
            const audioBuffer = offlineCtx.createBuffer(1, floatArray.length, sampleRate);
            audioBuffer.getChannelData(0).set(floatArray);

            const source = offlineCtx.createBufferSource();
            source.buffer = audioBuffer;
            source.playbackRate.value = profile.playbackRate;

            const biquadFilter = offlineCtx.createBiquadFilter();
            biquadFilter.type = "lowshelf";
            biquadFilter.frequency.value = profile.eqLow.freq;
            biquadFilter.gain.value = profile.eqLow.gain;

            const highShelf = offlineCtx.createBiquadFilter();
            highShelf.type = "highshelf";
            highShelf.frequency.value = profile.eqHigh.freq;
            highShelf.gain.value = profile.eqHigh.gain;

            const masterGain = offlineCtx.createGain();
            masterGain.gain.value = 1.2;

            source.connect(biquadFilter);
            biquadFilter.connect(highShelf);
            highShelf.connect(masterGain);
            masterGain.connect(offlineCtx.destination);
            
            source.start(0);

            return await offlineCtx.startRendering();
        }

        function playAndProvideDownload(renderedBuffer) {
            initAudioContext();
            
            // Generate Download URL
            if (currentDownloadUrl) URL.revokeObjectURL(currentDownloadUrl);
            const wavBlob = audioBufferToWav(renderedBuffer);
            currentDownloadUrl = URL.createObjectURL(wavBlob);
            
            downloadLink.href = currentDownloadUrl;
            const charId = characterSelect.value;
            downloadLink.download = `${charId}_audio.wav`;
            downloadSection.style.display = 'flex';

            // Play Audio
            const source = audioContext.createBufferSource();
            source.buffer = renderedBuffer;
            source.connect(audioContext.destination);

            source.onended = () => {
                speakBtn.disabled = false;
                speakBtn.innerHTML = `▶ Speak, Man!`;
            };

            source.start(0);
        }

        // --- Text to Speech Logic ---
        speakBtn.addEventListener('click', async () => {
            const text = textInput.value.trim();
            const userApiKey = apiKeyInput.value.trim();

            if (!text) return;

            errorMsg.style.display = 'none';

            if (!userApiKey) {
                errorMsg.innerHTML = "D'oh! You forgot the API Key up top!";
                errorMsg.style.display = 'block';
                return;
            }

            // Save key for future use
            localStorage.setItem('khala_api_key', userApiKey);

            initAudioContext();
            
            const selectedCharId = characterSelect.value;
            const profile = characterProfiles[selectedCharId];
            const ttsUrl = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-tts:generateContent?key=${userApiKey}`;

            speakBtn.disabled = true;
            loadingIndicator.style.display = 'flex';
            downloadSection.style.display = 'none';

            try {
                const promptText = `${profile.prompt}${text}`;
                
                const payload = {
                    contents: [{ parts: [{ text: promptText }] }],
                    generationConfig: {
                        responseModalities: ["AUDIO"],
                        speechConfig: {
                            voiceConfig: {
                                prebuiltVoiceConfig: { voiceName: profile.voice } 
                            }
                        }
                    },
                    model: "gemini-2.5-flash-preview-tts"
                };

                const result = await fetchWithBackoff(ttsUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if (result.candidates && result.candidates[0] && result.candidates[0].content.parts[0].inlineData) {
                    const inlineData = result.candidates[0].content.parts[0].inlineData;
                    const base64Audio = inlineData.data;
                    
                    const mimeType = inlineData.mimeType || "";
                    const rateMatch = mimeType.match(/rate=(\d+)/);
                    const sampleRate = rateMatch ? parseInt(rateMatch[1], 10) : 24000;

                    const floatArray = base64ToFloat32Array(base64Audio);
                    
                    speakBtn.innerHTML = `Synthesizing...`;
                    
                    // Render Audio Offline
                    const renderedBuffer = await renderCartoonAudio(floatArray, sampleRate, profile);
                    
                    loadingIndicator.style.display = 'none';
                    speakBtn.innerHTML = `Playing...`;
                    
                    playAndProvideDownload(renderedBuffer);

                } else {
                    throw new Error("Invalid response from the server.");
                }

            } catch (err) {
                console.error(err);
                loadingIndicator.style.display = 'none';
                speakBtn.disabled = false;
                speakBtn.innerHTML = `▶ Speak, Man!`;
                errorMsg.innerHTML = "Ay caramba! Connection failed: " + err.message;
                errorMsg.style.display = 'block';
            }
        });

        // --- Speech to Text (Voice Dictation) Logic ---
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        let recognition;

        if (SpeechRecognition) {
            recognition = new SpeechRecognition();
            recognition.continuous = false;
            recognition.interimResults = true;
            recognition.lang = 'en-US';

            recognition.onstart = function() {
                dictateBtn.classList.add('animate-pulse');
                dictateBtn.innerHTML = `Listening...`;
                textInput.placeholder = "Listening to your voice...";
            };

            recognition.onresult = function(event) {
                let finalTranscript = '';
                let interimTranscript = '';

                for (let i = event.resultIndex; i < event.results.length; ++i) {
                    if (event.results[i].isFinal) {
                        finalTranscript += event.results[i][0].transcript;
                    } else {
                        interimTranscript += event.results[i][0].transcript;
                    }
                }

                if (finalTranscript) {
                    finalTranscript = finalTranscript.trim();
                    finalTranscript = finalTranscript.charAt(0).toUpperCase() + finalTranscript.slice(1);
                    if (!finalTranscript.match(/[.!?]$/)) finalTranscript += '.';
                    
                    const currentText = textInput.value;
                    textInput.value = currentText ? currentText + ' ' + finalTranscript : finalTranscript;
                }
            };

            recognition.onerror = function(event) {
                console.error("Speech recognition error", event.error);
                resetDictateBtn();
                errorMsg.innerHTML = "Microphone failed. Did you grant access?";
                errorMsg.style.display = 'block';
            };

            recognition.onend = function() {
                resetDictateBtn();
                textInput.placeholder = "Mmm... forbidden donut...";
            };
        } else {
            dictateBtn.disabled = true;
            dictateBtn.title = "Voice recognition not supported in this browser.";
        }

        function resetDictateBtn() {
            dictateBtn.classList.remove('animate-pulse');
            dictateBtn.innerHTML = `🎤 Dictate`;
        }

        dictateBtn.addEventListener('click', () => {
            if (recognition) {
                errorMsg.style.display = 'none';
                try {
                    recognition.start();
                } catch (e) {
                    recognition.stop();
                }
            }
        });

    </script>
</body>
</html>
